---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: '1'
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  name: leaderworkerset
spec:
  destination:
    name: in-cluster
    namespace: openshift-lws-operator
  project: default
  source:
    helm:
      valueFiles:
      - ../../clusters/cluster-zrwzr.zrwzr.sandbox934.opentlc.com/cluster.yaml
    path: charts/leaderworkerset
    repoURL: git@github.com:Sheryl-shiyi/James-openshift-setup.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      backoff:
        duration: 10s
        factor: 3
        maxDuration: 30m
      limit: 10
