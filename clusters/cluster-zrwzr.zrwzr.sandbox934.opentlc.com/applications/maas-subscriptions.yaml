---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: '6'
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  name: maas-subscriptions
spec:
  destination:
    name: in-cluster
    namespace: models-as-a-service
  project: default
  source:
    helm:
      valueFiles:
      - ../../clusters/cluster-zrwzr.zrwzr.sandbox934.opentlc.com/cluster.yaml
      - ../../clusters/cluster-zrwzr.zrwzr.sandbox934.opentlc.com/values/maas-subscriptions/values.yaml
    path: charts/maas-subscriptions
    repoURL: git@github.com:Sheryl-shiyi/James-openshift-setup.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        argocd.argoproj.io/managed-by: openshift-gitops
    retry:
      backoff:
        duration: 10s
        factor: 3
        maxDuration: 30m
      limit: 10
    syncOptions:
    - CreateNamespace=true
