# Phase 1: Install operator first (MaaS requires CRDs from operator)
# After operator is ready, change modelsAsService to Managed
dataScienceCluster:
  components:
    kserve:
      modelsAsService:
        managementState: Removed

gateways:
  maasDefaultGateway:
    useRoute: true
    certificate:
      create: false
  openshiftAiInference:
    create: true
    useRoute: true
    certificate:
      create: false
