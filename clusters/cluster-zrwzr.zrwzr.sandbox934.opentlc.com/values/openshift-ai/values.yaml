dataScienceCluster:
  components:
    kserve:
      modelsAsService:
        managementState: Managed

gateways:
  maasDefaultGateway:
    useRoute: true
    certificate:
      create: false
  openshiftAiInference:
    create: true
    useRoute: true
    certificate:
      create: false

postgres-cluster:
  enabled: true
  namespace: redhat-ods-applications

dashboardConfig:
  disableModelCatalog: false
  disableKueue: false
  disableLMEval: false
  disableModelMesh: true
  disableTracking: true
  enablement: true
