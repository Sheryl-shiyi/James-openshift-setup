dataScienceCluster:
  components:
    kserve:
      modelsAsService:
        managementState: Managed

gateways:
  maasDefaultGateway:
    useRoute: true
    certificate:
      create: false
  openshiftAiInference:
    create: true
    useRoute: true
    certificate:
      create: false

dashboardConfig:
  disableHardwareProfiles: false
  disableModelCatalog: false
  disableKueue: false
  disableLMEval: false
  disableFineTuning: false
  disableModelMesh: true
  disableTracking: true
  enablement: true
